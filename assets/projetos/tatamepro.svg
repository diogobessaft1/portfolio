<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="tp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10131B"/>
      <stop offset="1" stop-color="#0C0E15"/>

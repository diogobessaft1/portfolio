<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="tp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13131C"/>
      <stop offset="1" stop-color="#0C0E15"/>
    </linearGradient>
    <radialGradient id="tp-glow" cx="50%" cy="-5%" r="75%">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#F97316" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tp-orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FDBA74"/>
      <stop offset="0.5" stop-color="#FB923C"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
  </defs>

  <rect width="800" height="550" fill="url(#tp-bg)"/>
  <rect width="800" height="550" fill="url(#tp-glow)"/>

  <!-- nav -->
  <rect x="40" y="20" width="30" height="30" rx="9" fill="url(#tp-orange)"/>
  <text x="55" y="41" font-size="15" font-weight="700" fill="#0C0E15" text-anchor="middle">T</text>
  <text x="80" y="40" font-size="15" font-weight="600" fill="#E8EAF0">TatamePro</text>
  <text x="338" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Recursos</text>
  <text x="410" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Planos</text>
  <text x="480" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Perguntas</text>
  <text x="648" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Entrar</text>
  <rect x="688" y="19" width="92" height="32" rx="16" fill="url(#tp-orange)"/>
  <text x="734" y="39" font-size="12.5" font-weight="600" fill="#0C0E15" text-anchor="middle">Começar grátis</text>

  <!-- badge -->
  <rect x="289" y="80" width="222" height="27" rx="13.5" fill="#1A1622" stroke="#3A2A1E"/>
  <circle cx="312" cy="93.5" r="4" fill="#FB923C"/>
  <text x="324" y="98" font-size="12" fill="#D8C3B2">14 dias grátis, sem cartão</text>

  <!-- headline -->
  <text x="400" y="158" font-size="40" font-weight="800" letter-spacing="-0.02em" fill="#F4F5F8" text-anchor="middle">Sua academia de jiu-jitsu</text>
  <text x="400" y="204" font-size="40" font-weight="800" letter-spacing="-0.02em" fill="url(#tp-orange)" text-anchor="middle">organizada num só lugar</text>

  <!-- subtitle -->
  <text x="400" y="238" font-size="14" fill="#9AA0AE" text-anchor="middle">Alunos, matrículas, planos e cobranças com automação por e-mail.</text>
  <text x="400" y="258" font-size="14" fill="#9AA0AE" text-anchor="middle">Pare de perder aluno e mensalidade na planilha.</text>

  <!-- CTAs -->
  <rect x="232" y="282" width="212" height="42" rx="11" fill="url(#tp-orange)"/>
  <text x="338" y="308" font-size="14" font-weight="600" fill="#0C0E15" text-anchor="middle">Começar grátis agora  →</text>
  <text x="548" y="308" font-size="14" font-weight="500" fill="#C7CBD6" text-anchor="middle">Ver demonstração  →</text>

  <!-- feature checks -->
  <text x="276" y="356" font-size="12" fill="#34D399" text-anchor="middle">✓</text>
  <text x="288" y="356" font-size="12" fill="#8A90A2">Sem cartão</text>
  <text x="392" y="356" font-size="12" fill="#34D399" text-anchor="middle">✓</text>
  <text x="404" y="356" font-size="12" fill="#8A90A2">Multi-tenant</text>
  <text x="512" y="356" font-size="12" fill="#34D399" text-anchor="middle">✓</text>
  <text x="524" y="356" font-size="12" fill="#8A90A2">Cancele quando quiser</text>

  <!-- dashboard peek -->
  <rect x="130" y="384" width="540" height="200" rx="16" fill="#15151F" stroke="#2A2A38"/>
  <circle cx="152" cy="406" r="4" fill="#3A3A4A"/>
  <circle cx="166" cy="406" r="4" fill="#3A3A4A"/>
  <circle cx="180" cy="406" r="4" fill="#3A3A4A"/>
  <text x="152" y="438" font-size="9.5" letter-spacing="0.08em" fill="#565D70">DASHBOARD</text>
  <text x="152" y="458" font-size="16" font-weight="700" fill="#E8EAF0">Olá, Professor ✦</text>
  <rect x="560" y="430" width="90" height="26" rx="13" fill="#1E1A24" stroke="#3A2A1E"/>
  <text x="605" y="447" font-size="11" fill="#FB923C" text-anchor="middle">Plano Pro</text>

  <rect x="150" y="476" width="157" height="92" rx="11" fill="#1A1A24" stroke="#2A2A38"/>
  <text x="166" y="500" font-size="9.5" letter-spacing="0.06em" fill="#8A90A2">ALUNOS ATIVOS</text>
  <text x="166" y="528" font-size="24" font-weight="700" fill="#FB923C">47</text>
  <text x="166" y="548" font-size="10.5" fill="#34D399">+5 este mês</text>

  <rect x="321" y="476" width="157" height="92" rx="11" fill="#1A1A24" stroke="#2A2A38"/>
  <text x="337" y="500" font-size="9.5" letter-spacing="0.06em" fill="#8A90A2">FATURAMENTO</text>
  <text x="337" y="528" font-size="24" font-weight="700" fill="#E8EAF0">R$ 8.430</text>
  <text x="337" y="548" font-size="10.5" fill="#34D399">+18% mês</text>

  <rect x="492" y="476" width="158" height="92" rx="11" fill="#1A1A24" stroke="#2A2A38"/>
  <text x="508" y="500" font-size="9.5" letter-spacing="0.06em" fill="#8A90A2">FREQUÊNCIA</text>
  <text x="508" y="528" font-size="24" font-weight="700" fill="#E8EAF0">92%</text>
  <text x="508" y="548" font-size="10.5" fill="#8A90A2">esta semana</text>
</svg>

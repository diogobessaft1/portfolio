<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="cv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10131B"/>
      <stop offset="1" stop-color="#0C0E15"/>
    </linearGradient>
    <linearGradient id="cv-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="550" fill="url(#cv-bg)"/>

  <!-- top bar -->
  <rect x="28" y="20" width="28" height="28" rx="8" fill="url(#cv-indigo)"/>
  <text x="42" y="39" font-size="13" font-weight="700" fill="#0A0C12" text-anchor="middle">CV</text>
  <text x="66" y="39" font-size="16" font-weight="600" fill="#E8EAF0">CV Tailor</text>
  <rect x="636" y="18" width="136" height="34" rx="10" fill="#161A24" stroke="#262B38"/>
  <text x="704" y="40" font-size="12.5" font-weight="500" fill="#9AA0AE" text-anchor="middle">Exportar PDF</text>

  <!-- ============ LEFT: job input ============ -->
  <rect x="28" y="74" width="300" height="452" rx="14" fill="#13161F" stroke="#262B38"/>
  <text x="48" y="106" font-size="10.5" letter-spacing="0.08em" fill="#565D70">DESCRIÇÃO DA VAGA</text>

  <rect x="48" y="120" width="260" height="232" rx="10" fill="#0E1118" stroke="#222734"/>
  <rect x="64" y="140" width="170" height="9" rx="4.5" fill="#2A3040"/>
  <rect x="64" y="160" width="228" height="9" rx="4.5" fill="#222734"/>
  <rect x="64" y="180" width="206" height="9" rx="4.5" fill="#222734"/>
  <!-- detected keyword inside the job text -->
  <rect x="64" y="198" width="60" height="20" rx="6" fill="#6366F1" fill-opacity="0.20"/>
  <text x="94" y="212" font-size="11" font-weight="500" fill="#A5B4FC" text-anchor="middle">React</text>
  <rect x="132" y="201" width="120" height="9" rx="4.5" fill="#222734"/>
  <rect x="64" y="232" width="190" height="9" rx="4.5" fill="#222734"/>
  <rect x="64" y="252" width="50" height="20" rx="6" fill="#6366F1" fill-opacity="0.20"/>
  <text x="89" y="266" font-size="11" font-weight="500" fill="#A5B4FC" text-anchor="middle">AWS</text>
  <rect x="122" y="255" width="130" height="9" rx="4.5" fill="#222734"/>
  <rect x="64" y="286" width="216" height="9" rx="4.5" fill="#222734"/>
  <rect x="64" y="306" width="140" height="9" rx="4.5" fill="#222734"/>

  <text x="48" y="390" font-size="12" fill="#8A90A2">Vaga detectada</text>
  <text x="48" y="410" font-size="13.5" font-weight="500" fill="#E8EAF0">Desenvolvedor Frontend Pleno</text>

  <rect x="48" y="466" width="260" height="44" rx="11" fill="url(#cv-indigo)"/>
  <text x="178" y="493" font-size="14" font-weight="600" fill="#0A0C12" text-anchor="middle">✦  Gerar currículo</text>

  <!-- ============ RIGHT: generated CV ============ -->
  <rect x="346" y="74" width="426" height="452" rx="14" fill="#13161F" stroke="#262B38"/>
  <text x="366" y="106" font-size="14" font-weight="600" fill="#E8EAF0">Currículo gerado</text>
  <text x="366" y="124" font-size="11" fill="#565D70">otimizado para ATS</text>

  <!-- ATS score ring -->
  <circle cx="722" cy="118" r="32" fill="none" stroke="#222734" stroke-width="7"/>
  <circle cx="722" cy="118" r="32" fill="none" stroke="url(#cv-indigo)" stroke-width="7"
          stroke-linecap="round" stroke-dasharray="185 201" transform="rotate(-90 722 118)"/>
  <text x="722" y="118" font-size="16" font-weight="700" fill="#A5B4FC" text-anchor="middle">92%</text>
  <text x="722" y="133" font-size="8.5" letter-spacing="0.05em" fill="#8A90A2" text-anchor="middle">MATCH</text>

  <line x1="366" y1="148" x2="754" y2="148" stroke="#222734"/>

  <!-- CV header -->
  <text x="366" y="182" font-size="18" font-weight="700" fill="#E8EAF0">DIOGO BESSA</text>
  <text x="366" y="202" font-size="12.5" fill="#9AA0AE">Desenvolvedor Web Fullstack</text>
  <line x1="366" y1="216" x2="754" y2="216" stroke="#1E2430"/>

  <!-- EXPERIÊNCIA -->
  <text x="366" y="244" font-size="10.5" letter-spacing="0.08em" fill="#818CF8">EXPERIÊNCIA</text>

  <!-- line 1 -->
  <rect x="366" y="256" width="68" height="10" rx="5" fill="#2A3040"/>
  <rect x="442" y="251" width="58" height="20" rx="6" fill="#6366F1" fill-opacity="0.22"/>
  <text x="471" y="265" font-size="11.5" font-weight="500" fill="#A5B4FC" text-anchor="middle">React</text>
  <rect x="508" y="256" width="120" height="10" rx="5" fill="#222734"/>
  <rect x="636" y="256" width="80" height="10" rx="5" fill="#222734"/>

  <!-- line 2 -->
  <rect x="366" y="281" width="92" height="20" rx="6" fill="#6366F1" fill-opacity="0.22"/>
  <text x="412" y="295" font-size="11.5" font-weight="500" fill="#A5B4FC" text-anchor="middle">TypeScript</text>
  <rect x="466" y="286" width="64" height="10" rx="5" fill="#222734"/>
  <rect x="538" y="286" width="150" height="10" rx="5" fill="#222734"/>

  <!-- line 3 -->
  <rect x="366" y="316" width="52" height="10" rx="5" fill="#222734"/>
  <rect x="426" y="311" width="70" height="20" rx="6" fill="#6366F1" fill-opacity="0.22"/>
  <text x="461" y="325" font-size="11.5" font-weight="500" fill="#A5B4FC" text-anchor="middle">Node.js</text>
  <rect x="504" y="316" width="92" height="10" rx="5" fill="#222734"/>
  <rect x="604" y="311" width="48" height="20" rx="6" fill="#6366F1" fill-opacity="0.22"/>
  <text x="628" y="325" font-size="11.5" font-weight="500" fill="#A5B4FC" text-anchor="middle">AWS</text>

  <!-- line 4 -->
  <rect x="366" y="346" width="140" height="10" rx="5" fill="#222734"/>
  <rect x="514" y="341" width="58" height="20" rx="6" fill="#6366F1" fill-opacity="0.22"/>
  <text x="543" y="355" font-size="11.5" font-weight="500" fill="#A5B4FC" text-anchor="middle">CI/CD</text>
  <rect x="580" y="346" width="90" height="10" rx="5" fill="#222734"/>

  <!-- FORMAÇÃO -->
  <text x="366" y="394" font-size="10.5" letter-spacing="0.08em" fill="#818CF8">FORMAÇÃO</text>
  <rect x="366" y="406" width="180" height="10" rx="5" fill="#2A3040"/>
  <rect x="366" y="426" width="120" height="10" rx="5" fill="#222734"/>
  <rect x="498" y="421" width="62" height="20" rx="6" fill="#6366F1" fill-opacity="0.22"/>
  <text x="529" y="435" font-size="11.5" font-weight="500" fill="#A5B4FC" text-anchor="middle">Scrum</text>

  <!-- ATS keywords matched footer -->
  <line x1="366" y1="462" x2="754" y2="462" stroke="#1E2430"/>
  <circle cx="372" cy="487" r="3" fill="#6366F1"/>
  <text x="384" y="491" font-size="11.5" fill="#9AA0AE">18 de 20 palavras-chave da vaga incluídas</text>
</svg>

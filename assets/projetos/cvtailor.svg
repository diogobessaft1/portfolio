<svg xmlns="http://www.w3.org/2000/svg" width="800" height="550" viewBox="0 0 800 550" font-family="'Inter','Segoe UI',system-ui,-apple-system,sans-serif">
  <defs>
    <linearGradient id="cv-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13141C"/>
      <stop offset="1" stop-color="#0C0E15"/>
    </linearGradient>
    <radialGradient id="cv-glow" cx="50%" cy="-5%" r="75%">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.24"/>
      <stop offset="0.55" stop-color="#6366F1" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cv-indigo" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#A5B4FC"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <rect width="800" height="550" fill="url(#cv-bg)"/>
  <rect width="800" height="550" fill="url(#cv-glow)"/>

  <!-- nav -->
  <rect x="40" y="20" width="30" height="30" rx="9" fill="url(#cv-indigo)"/>
  <text x="55" y="40" font-size="12" font-weight="700" fill="#0C0E15" text-anchor="middle">CV</text>
  <text x="80" y="40" font-size="15" font-weight="600" fill="#E8EAF0">CV Tailor</text>
  <text x="348" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Recursos</text>
  <text x="420" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Preços</text>
  <text x="488" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Perguntas</text>
  <text x="648" y="39" font-size="12.5" fill="#9AA0AE" text-anchor="middle">Entrar</text>
  <rect x="688" y="19" width="92" height="32" rx="16" fill="url(#cv-indigo)"/>
  <text x="734" y="39" font-size="12.5" font-weight="600" fill="#0C0E15" text-anchor="middle">Começar grátis</text>

  <!-- badge -->
  <rect x="305" y="80" width="190" height="27" rx="13.5" fill="#171825" stroke="#272A45"/>
  <circle cx="328" cy="93.5" r="4" fill="#818CF8"/>
  <text x="340" y="98" font-size="12" fill="#BFC4E8">Powered by Claude</text>

  <!-- headline -->
  <text x="400" y="158" font-size="40" font-weight="800" letter-spacing="-0.02em" fill="#F4F5F8" text-anchor="middle">Seu currículo adaptado</text>
  <text x="400" y="204" font-size="40" font-weight="800" letter-spacing="-0.02em" fill="url(#cv-indigo)" text-anchor="middle">a cada vaga, com IA</text>

  <!-- subtitle -->
  <text x="400" y="238" font-size="14" fill="#9AA0AE" text-anchor="middle">A IA analisa o anúncio, calcula a compatibilidade e reescreve</text>
  <text x="400" y="258" font-size="14" fill="#9AA0AE" text-anchor="middle">sua experiência real. Currículos otimizados para ATS em segundos.</text>

  <!-- CTAs -->
  <rect x="236" y="282" width="206" height="42" rx="11" fill="url(#cv-indigo)"/>
  <text x="339" y="308" font-size="14" font-weight="600" fill="#0C0E15" text-anchor="middle">Adaptar meu currículo  →</text>
  <text x="524" y="308" font-size="14" font-weight="500" fill="#C7CBD6" text-anchor="middle">Ver exemplo  →</text>

  <!-- feature checks -->
  <text x="270" y="356" font-size="12" fill="#818CF8" text-anchor="middle">✓</text>
  <text x="282" y="356" font-size="12" fill="#8A90A2">Export PDF/DOCX</text>
  <text x="404" y="356" font-size="12" fill="#818CF8" text-anchor="middle">✓</text>
  <text x="416" y="356" font-size="12" fill="#8A90A2">Score ATS</text>
  <text x="500" y="356" font-size="12" fill="#818CF8" text-anchor="middle">✓</text>
  <text x="512" y="356" font-size="12" fill="#8A90A2">Carta de apresentação</text>

  <!-- analysis peek -->
  <rect x="130" y="384" width="540" height="200" rx="16" fill="#15161F" stroke="#272A38"/>
  <circle cx="152" cy="406" r="4" fill="#3A3A4A"/>
  <circle cx="166" cy="406" r="4" fill="#3A3A4A"/>
  <circle cx="180" cy="406" r="4" fill="#3A3A4A"/>
  <text x="152" y="438" font-size="9.5" letter-spacing="0.08em" fill="#565D70">ANÁLISE DA VAGA</text>
  <text x="152" y="458" font-size="16" font-weight="700" fill="#E8EAF0">Desenvolvedor Frontend</text>
  <rect x="556" y="430" width="94" height="26" rx="13" fill="#1A1B2A" stroke="#2C2F52"/>
  <text x="603" y="447" font-size="11" fill="#A5B4FC" text-anchor="middle">Reescrito ✦</text>

  <rect x="150" y="476" width="157" height="92" rx="11" fill="#181A26" stroke="#272A38"/>
  <text x="166" y="500" font-size="9.5" letter-spacing="0.06em" fill="#8A90A2">MATCH ATS</text>
  <text x="166" y="528" font-size="24" font-weight="700" fill="#A5B4FC">92%</text>
  <text x="166" y="548" font-size="10.5" fill="#34D399">+27 vs. original</text>

  <rect x="321" y="476" width="157" height="92" rx="11" fill="#181A26" stroke="#272A38"/>
  <text x="337" y="500" font-size="9.5" letter-spacing="0.06em" fill="#8A90A2">PALAVRAS-CHAVE</text>
  <text x="337" y="528" font-size="24" font-weight="700" fill="#E8EAF0">18/20</text>
  <text x="337" y="548" font-size="10.5" fill="#8A90A2">da vaga incluídas</text>

  <rect x="492" y="476" width="158" height="92" rx="11" fill="#181A26" stroke="#272A38"/>
  <text x="508" y="500" font-size="9.5" letter-spacing="0.06em" fill="#8A90A2">GERADO EM</text>
  <text x="508" y="528" font-size="24" font-weight="700" fill="#E8EAF0">8s</text>
  <text x="508" y="548" font-size="10.5" fill="#8A90A2">PDF · DOCX</text>
</svg>

<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sobre — Diogo Bessa</title>
<meta name="description" content="Sobre Diogo Bessa — perfil e experiência." />
<!-- evita flash de tema: aplica o tema salvo antes de pintar -->
<script>
  (function () {
    try {
      var t = localStorage.getItem('theme');
      if (t) document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo">@diogobessaft1</a>
    <div class="nav-links">
      <a href="index.html#projetos">Projetos</a>
      <a href="sobre.html">Sobre</a>
      <a href="index.html#contato">Contato</a>
      <button class="theme-btn" id="theme-btn" aria-label="Alternar tema" onclick="toggleTheme()">
        <svg id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>
      </button>
    </div>
  </div>
</nav>

<main class="about">
  <!-- intro -->
  <section class="intro-grid">
    <div>
      <h1 class="intro-headline" id="intro-headline"></h1>
      <div class="intro-paras" id="intro-paras"></div>
    </div>
    <div class="portrait" id="portrait"></div>
  </section>

  <!-- experiência -->
  <h2 class="about-sec-title">Experiência</h2>
  <div class="xp-layout">
    <nav class="timeline" id="timeline" aria-label="Linha do tempo de experiências"></nav>
    <div class="xp-entries" id="xp-entries"></div>
  </div>
</main>

<footer>
  <div class="wrap foot-inner">
    <span class="foot-copy">© 2026 Diogo Bessa</span>
    <div class="foot-links">
      <a href="https://instagram.com/diogobessa.tech" target="_blank" rel="noopener">Instagram</a>
      <a href="mailto:diogo.bessa04@gmail.com">E-mail</a>
    </div>
  </div>
</footer>

<script src="sobre.js"></script>
<script>
  // ===== Tema (claro/escuro) =====
  syncThemeIcon();
  function toggleTheme() {
    var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', cur);
    try { localStorage.setItem('theme', cur); } catch (e) {}
    syncThemeIcon();
  }
  function syncThemeIcon() {
    var dark = document.documentElement.getAttribute('data-theme') === 'dark';
    document.getElementById('icon-sun').style.display = dark ? 'none' : 'block';
    document.getElementById('icon-moon').style.display = dark ? 'block' : 'none';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  (function renderSobre() {
    var intro = SOBRE.intro || {};
    var xps = SOBRE.experiences || [];

    // ---- intro ----
    document.getElementById('intro-headline').textContent = intro.headline || '';
    var parasEl = document.getElementById('intro-paras');
    parasEl.innerHTML = (intro.paragraphs || [])
      .map(function (p) { return '<p>' + esc(p) + '</p>'; }).join('');

    // foto: se ainda for placeholder "TODO", mostra caixa placeholder
    var portrait = document.getElementById('portrait');
    var photo = intro.photo || '';
    if (photo && photo.indexOf('TODO') !== 0) {
      portrait.innerHTML = '<img src="' + esc(photo) + '" alt="Retrato" />';
    } else {
      portrait.classList.add('placeholder');
      portrait.textContent = 'TODO: adicionar foto/retrato';
    }

    // ---- timeline (anos vêm dos dados) ----
    var timeline = document.getElementById('timeline');
    timeline.innerHTML = xps.map(function (xp, i) {
      return '<button class="tl-item" type="button" data-target="xp-' + i + '">' +
               '<span class="tl-dash"></span><span>' + esc(xp.year != null ? xp.year : '') + '</span>' +
             '</button>';
    }).join('');

    // ---- entradas de experiência ----
    var entriesEl = document.getElementById('xp-entries');
    entriesEl.innerHTML = xps.map(function (xp, i) {
      var bullets = (xp.bullets || []).map(function (b) { return '<li>' + esc(b) + '</li>'; }).join('');
      var tech = (xp.tech || []).map(function (t) { return '<span class="tech-badge">' + esc(t) + '</span>'; }).join('');
      return '<article class="xp-entry" id="xp-' + i + '">' +
               '<p class="xp-date">' + esc(xp.dateRange || '') + '</p>' +
               '<h3 class="xp-company">' + esc(xp.company || '') + '</h3>' +
               '<p class="xp-role">' + esc(xp.role || '') + '</p>' +
               '<ul class="xp-bullets">' + bullets + '</ul>' +
               '<div class="xp-tech">' + tech + '</div>' +
             '</article>';
    }).join('');

    var tlItems = Array.prototype.slice.call(timeline.querySelectorAll('.tl-item'));
    var entries = Array.prototype.slice.call(entriesEl.querySelectorAll('.xp-entry'));

    // clique no ano -> rola suave até a entrada
    tlItems.forEach(function (item) {
      item.addEventListener('click', function () {
        var el = document.getElementById(item.getAttribute('data-target'));
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // scroll-spy: destaca o ano da entrada em foco
    function setActive(idx) {
      tlItems.forEach(function (it, i) { it.classList.toggle('active', i === idx); });
    }
    if (entries.length) {
      setActive(0);
      if ('IntersectionObserver' in window) {
        var visible = {};
        var obs = new IntersectionObserver(function (items) {
          items.forEach(function (e) {
            visible[e.target.id] = e.isIntersecting ? e.intersectionRatio : 0;
          });
          // escolhe a entrada mais visível
          var bestIdx = 0, bestRatio = -1;
          entries.forEach(function (el, i) {
            var r = visible[el.id] || 0;
            if (r > bestRatio) { bestRatio = r; bestIdx = i; }
          });
          if (bestRatio > 0) setActive(bestIdx);
        }, { rootMargin: '-45% 0px -45% 0px', threshold: [0, 0.25, 0.5, 1] });
        entries.forEach(function (el) { obs.observe(el); });
      }
    }
  })();
</script>

</body>
</html>
